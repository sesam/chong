name = "chong-server"
main = "src/index.ts"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "chong"
database_id = "c6799600-76c0-4a34-acd6-653a3248ccf8"

[vars]
# Public, non-secret config — override in production via dashboard or via this file.
HARNESS_URL = "https://git.example.com"

# Secrets — set with `wrangler secret put <NAME>`:
#   HARNESS_BOT_PAT   service-account PAT used to bypass approval rule on squash-merge
#   ANTHROPIC_API_KEY for commit coaching
